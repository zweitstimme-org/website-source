{{ define "main" }}
<article class="post-single">
    <header class="post-header">
        <h1 class="post-title">{{ .Title }}</h1>
    </header>

    <div class="iframe-container" style="position: relative; padding-bottom: 150%; height: 0; overflow: hidden;">
        <iframe src="/ballot" 
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"
                frameborder="0">
        </iframe>
    </div>
</article>
{{ end }}
